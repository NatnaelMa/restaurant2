<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardrock Restaurant - Feedback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background-color: #000;
            color: #fff;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: #fff;
            margin: 20px 0;
            font-size: 2rem;
        }
        
        h2 {
            color: #fff;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #ff0000;
        }
        
        .back-link {
            display: inline-block;
            color: #ff0000;
            text-decoration: none;
            margin: 10px 0 20px 0;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .feedback-form {
            background: #222;
            padding: 25px;
            border-radius: 5px;
            margin: 20px 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .rating {
            display: flex;
            gap: 15px;
            margin: 10px 0;
        }
        
        .rating input {
            width: auto;
            margin-right: 5px;
        }
        
        .rating label {
            display: inline;
            font-weight: normal;
        }
        
        .submit-btn {
            background: #ff0000;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        
        .submit-btn:hover {
            background: #cc0000;
        }
        
        .thank-you {
            background: #222;
            padding: 30px;
            text-align: center;
            margin: 30px 0;
            display: none;
        }
        
        .stars {
            color: #ffcc00;
            font-size: 24px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Home</a>
    
    <h1>Share Your Feedback</h1>
    
    <p>We value your opinion. Please share your experience at Hardrock Restaurant.</p>
    
    <div class="feedback-form" id="feedbackForm">
        <h2>Your Experience</h2>
        
        <form id="feedbackFormElement">
            <div class="form-group">
                <label for="name">Your Name (Optional)</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="email">Email (Optional)</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="visitDate">Date of Visit</label>
                <input type="date" id="visitDate">
            </div>
            
            <div class="form-group">
                <label>Overall Rating</label>
                <div class="rating">
                    <input type="radio" id="star5" name="rating" value="5">
                    <label for="star5">Excellent (5)</label>
                    
                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4">Good (4)</label>
                    
                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3">Average (3)</label>
                    
                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2">Poor (2)</label>
                    
                    <input type="radio" id="star1" name="rating" value="1">
                    <label for="star1">Bad (1)</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="category">Feedback Category</label>
                <select id="category">
                    <option value="">Select category</option>
                    <option value="food">Food Quality</option>
                    <option value="service">Service</option>
                    <option value="ambiance">Ambiance</option>
                    <option value="cleanliness">Cleanliness</option>
                    <option value="value">Value for Money</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Your Feedback</label>
                <textarea id="message" placeholder="Tell us about your experience..." required></textarea>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="contactPermission">
                    You may contact me regarding this feedback
                </label>
            </div>
            
            <button type="button" class="submit-btn" onclick="submitFeedback()">Submit Feedback</button>
        </form>
    </div>
    
    <div class="thank-you" id="thankYouMessage">
        <h2>Thank You!</h2>
        <div class="stars" id="ratingStars"></div>
        <p>Your feedback has been submitted successfully.</p>
        <p>We appreciate you taking the time to help us improve.</p>
        <p style="margin-top: 20px;">
            <a href="/index.html" class="back-link">Return to Home</a>
        </p>
    </div>
    
    <script>
        function submitFeedback() {
            const message = document.getElementById('message').value;
            const rating = document.querySelector('input[name="rating"]:checked');
            
            // Basic validation
            if (!message.trim()) {
                alert('Please enter your feedback message');
                return;
            }
            
            if (!rating) {
                alert('Please select a rating');
                return;
            }
            
            // Show thank you message
            document.getElementById('feedbackForm').style.display = 'none';
            document.getElementById('thankYouMessage').style.display = 'block';
            
            // Show stars based on rating
            const starsCount = parseInt(rating.value);
            const starsElement = document.getElementById('ratingStars');
            starsElement.innerHTML = '★'.repeat(starsCount);
            
            // In a real application, you would send the data to a server here
            // For now, we'll just log it
            const feedbackData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                visitDate: document.getElementById('visitDate').value,
                rating: starsCount,
                category: document.getElementById('category').value,
                message: message,
                contactPermission: document.getElementById('contactPermission').checked
            };
            
            console.log('Feedback submitted:', feedbackData);
        }
        
        // Set today's date as default
        document.getElementById('visitDate').valueAsDate = new Date();
    </script>
</body>
</html>
